name: QuietClipboard
attributes:
  LastUpgradeCheck: 1630
options:
  bundleIdPrefix: app.quiet
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.3"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    MARKETING_VERSION: "0.1.5"
    CURRENT_PROJECT_VERSION: "1"
    CLANG_CXX_LANGUAGE_STANDARD: gnu++20
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    DEAD_CODE_STRIPPING: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
targets:
  QuietClipboard:
    type: application
    platform: macOS
    sources:
      - path: QuietClipboard
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_NAME: "Quiet Clipboard"
        PRODUCT_BUNDLE_IDENTIFIER: app.quiet.QuietClipboard
        INFOPLIST_FILE: QuietClipboard/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    info:
      path: QuietClipboard/Info.plist
      properties:
        CFBundleName: Quiet Clipboard
        CFBundleDisplayName: Quiet Clipboard
        CFBundleIdentifier: app.quiet.QuietClipboard
        CFBundleShortVersionString: "0.1.3"
        CFBundleVersion: "1"
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: "15.0"
        LSUIElement: true
        NSHumanReadableCopyright: "MIT License"
        NSContactsUsageDescription: "Add contacts from detected emails and phone numbers on your clipboard."
        NSRemindersFullAccessUsageDescription: "Create reminders from detected dates on your clipboard."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
