name: QuietClipboard
options:
  bundleIdPrefix: app.quiet
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    GENERATE_INFOPLIST_FILE: NO
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  QuietClipboard:
    type: application
    platform: macOS
    sources:
      - path: QuietClipboard
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.quiet.QuietClipboard
        INFOPLIST_FILE: QuietClipboard/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    info:
      path: QuietClipboard/Info.plist
      properties:
        CFBundleName: Quiet Clipboard
        CFBundleDisplayName: Quiet Clipboard
        CFBundleIdentifier: app.quiet.QuietClipboard
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: "15.0"
        LSUIElement: true
        NSHumanReadableCopyright: "MIT License"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
